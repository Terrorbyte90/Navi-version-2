name: Navi
options:
  bundleIdPrefix: com.tedsvard.navi
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: 5.9
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: DV646H5VDP
    CODE_SIGN_STYLE: Automatic

configs:
  Debug: debug
  Release: release

packages: {}

targets:
  Navi-iOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: EonCode/Shared
        excludes:
          - "**/*.DS_Store"
      - path: EonCode/iOS
    resources:
      - path: EonCode/iOS/Assets.xcassets
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tedsvard.navi.ios
        INFOPLIST_FILE: EonCode/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: EonCode/iOS/Navi-iOS.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        DEVELOPMENT_TEAM: DV646H5VDP
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    entitlements:
      path: EonCode/iOS/Navi-iOS.entitlements
    info:
      path: EonCode/iOS/Info.plist
      properties:
        CFBundleDisplayName: Navi
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        NSLocalNetworkUsageDescription: "Navi uses local network for peer sync between your Mac and iPhone."
        NSBonjourServices:
          - _navi._tcp
          - _navi-http._tcp
        NSCameraUsageDescription: "Navi uses the camera to attach images to your messages."
        NSPhotoLibraryUsageDescription: "Navi accesses your photo library to attach images to your messages."
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
          - background-fetch
          - processing

  Navi-macOS:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: EonCode/Shared
        excludes:
          - "**/*.DS_Store"
      - path: EonCode/macOS
    resources:
      - path: EonCode/macOS/Assets.xcassets
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tedsvard.navi.macos
        INFOPLIST_FILE: EonCode/macOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: EonCode/macOS/Navi-macOS.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: DV646H5VDP
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: EonCode/macOS/Navi-macOS.entitlements
    info:
      path: EonCode/macOS/Info.plist
      properties:
        CFBundleDisplayName: Navi
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSPrincipalClass: NSApplication
        NSMainStoryboardFile: ""
        NSLocalNetworkUsageDescription: "Navi uses local network for peer sync."
        NSBonjourServices:
          - _navi._tcp
          - _navi-http._tcp
        ITSAppUsesNonExemptEncryption: false
