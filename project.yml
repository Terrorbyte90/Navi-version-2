name: EonCode
options:
  bundleIdPrefix: com.eoncode
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: 5.9
    ENABLE_HARDENED_RUNTIME: YES

configs:
  Debug: debug
  Release: release

packages: {}

targets:
  EonCode-iOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: EonCode/Shared
        excludes:
          - "**/*.DS_Store"
      - path: EonCode/iOS
      - path: mockups
        optional: true
    resources:
      - path: EonCode/iOS/Assets.xcassets
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eoncode.ios
        INFOPLIST_FILE: EonCode/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: EonCode/iOS/EonCode-iOS.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    entitlements:
      path: EonCode/iOS/EonCode-iOS.entitlements
    info:
      path: EonCode/iOS/Info.plist
      properties:
        CFBundleDisplayName: EonCode
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        NSLocalNetworkUsageDescription: "EonCode uses local network for peer sync between your Mac and iPhone."
        NSBonjourServices:
          - _eoncode._tcp
          - _eoncode-http._tcp
        NSCameraUsageDescription: "EonCode uses the camera to attach images to your messages."
        NSPhotoLibraryUsageDescription: "EonCode accesses your photo library to attach images to your messages."
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
          - background-fetch
          - processing

  EonCode-macOS:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: EonCode/Shared
        excludes:
          - "**/*.DS_Store"
      - path: EonCode/macOS
      - path: mockups
        optional: true
    resources:
      - path: EonCode/macOS/Assets.xcassets
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eoncode.macos
        INFOPLIST_FILE: EonCode/macOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: EonCode/macOS/EonCode-macOS.entitlements
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: EonCode/macOS/EonCode-macOS.entitlements
    info:
      path: EonCode/macOS/Info.plist
      properties:
        CFBundleDisplayName: EonCode
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSPrincipalClass: NSApplication
        NSMainStoryboardFile: ""
        NSLocalNetworkUsageDescription: "EonCode uses local network for peer sync."
        NSBonjourServices:
          - _eoncode._tcp
          - _eoncode-http._tcp
        ITSAppUsesNonExemptEncryption: false
